<script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)),
      y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }

function TweakRow({ label, children }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      {children}
    </div>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={e => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={e => onChange(e.target.value)}>
        {options.map(o => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakText, TweakSelect });
</script>

<script type="text/babel">

/* ─────────────────────────────────────────
   DESIGN TOKENS — SAM Play design system
   Dark-mode-first, charcoal ground, cream ink,
   vermillion accent. Self Modern display,
   Cosmica body, Cosmica Mono labels.
───────────────────────────────────────── */
const T = {
  /* Ground / surfaces */
  paper:        '#323131',   /* bone — main bg */
  paperDim:     '#3D3C3C',   /* chalk — card surface */
  paperDeep:    '#2A2929',   /* paper — deeper alt */

  /* Ink (light on dark) */
  ink:          '#F4EFE2',   /* warm cream — primary text */
  inkSoft:      '#C9C3B3',   /* ink-2 — secondary text */
  inkMid:       '#8C887D',   /* ink-3 — tertiary / meta */
  inkFaint:     '#5A5854',   /* ink-4 — disabled */
  rule:         '#8C887D',   /* ink-3 — rules / dividers */

  /* Accent */
  highlight:    '#C8341A',   /* vermillion — loud accent */
  highlightDeep:'#9E2410',   /* vermillion-deep */
};

const SANS  = "'Cosmica', system-ui, sans-serif";
const SERIF = "'Self Modern', Georgia, serif";
const MONO  = "'Cosmica Mono', 'JetBrains Mono', ui-monospace, monospace";

/* ─────────────────────────────────────────
   SHARED UTILITIES
───────────────────────────────────────── */
const useScaleToFit = (w, h) => {
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const calc = () => {
      const sw = window.innerWidth / (w + 60);
      const sh = window.innerHeight / (h + 60);
      setScale(Math.min(sw, sh, 1));
    };
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, [w, h]);
  return scale;
};

/* SAM logo image
   inverted=false → sam-logo.png       (use on light/cream backgrounds)
   inverted=true  → sam-logo-inverted.png (use on dark backgrounds)        */
function SamLogo({ height = 56, inverted = false, fallbackColor }) {
  const [err, setErr] = React.useState(false);
  const src = inverted ? './sam-logo-inverted.png' : './sam-logo.png';
  const fbColor = fallbackColor || (inverted ? T.ink : T.paper);
  React.useEffect(() => { setErr(false); }, [src]);
  if (err) return <Wordmark size={Math.round(height * 0.5)} color={fbColor} />;
  return (
    <img
      src={src}
      onError={() => setErr(true)}
      style={{ height, display: 'block', objectFit: 'contain' }}
    />
  );
}

/* Wordmark — SAM logotype treatment */
function Wordmark({ size = 26, color = T.ink }) {
  return (
    <div style={{
      fontFamily: SANS, fontWeight: 700, fontSize: size,
      letterSpacing: '0.18em', color, lineHeight: 1,
      display: 'inline-flex', alignItems: 'center', gap: 10,
      textTransform: 'uppercase',
    }}>
      <span>SAM</span>
      <span style={{
        width: 8, height: 8, background: T.highlight, borderRadius: '50%',
        display: 'inline-block', flexShrink: 0,
      }}/>
    </div>
  );
}

/* Mono label — uppercase tracked */
function MonoLabel({ children, color, style = {} }) {
  return (
    <div style={{
      fontFamily: MONO, fontWeight: 500, fontSize: 11,
      letterSpacing: '0.08em', textTransform: 'uppercase',
      color: color || T.inkMid, ...style,
    }}>{children}</div>
  );
}

/* Primary pill button — cream bg, charcoal text (or outline variant) */
function PillButton({ onClick, disabled, children, variant = 'primary', style = {} }) {
  const styles = {
    primary:  { background: T.ink,       color: T.paper,  border: `2px solid ${T.ink}` },
    secondary:{ background: T.paperDim,  color: T.ink,    border: `2px solid ${T.ink}` },
    outline:  { background: 'transparent', color: T.ink,  border: `2px solid ${T.ink}` },
    accent:   { background: T.highlight, color: T.paper,  border: `2px solid ${T.highlight}` },
  };
  const v = styles[variant] || styles.primary;
  return (
    <button onClick={onClick} disabled={disabled} style={{
      fontFamily: SANS, fontWeight: 600, fontSize: 16,
      letterSpacing: '0.01em',
      padding: '18px 28px',
      borderRadius: 999,
      ...v,
      cursor: disabled ? 'not-allowed' : 'pointer',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      transition: `transform 280ms cubic-bezier(0.34,1.56,0.64,1)`,
      opacity: disabled ? 0.4 : 1,
      width: '100%',
      ...style,
    }}
      onMouseEnter={e => { if (!disabled) e.currentTarget.style.transform = 'scale(1.02)'; }}
      onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
      onMouseDown={e => { if (!disabled) e.currentTarget.style.transform = 'scale(0.96)'; }}
      onMouseUp={e => { if (!disabled) e.currentTarget.style.transform = 'scale(1.02)'; }}
    >
      {children}
    </button>
  );
}

/* Thin rule */
function Rule({ my = 24, color }) {
  return <div style={{ height: 1, background: color || T.rule, marginTop: my, marginBottom: my, width: '100%' }} />;
}

/* ─────────────────────────────────────────
   TRIVIA DATA
───────────────────────────────────────── */
const TRIVIA = [
  {
    index: '01',
    fact: 'The artist, Utagawa Kunisada, was more famous in his lifetime than Katsushika Hokusai — the artist behind The Great Wave off Kanagawa.',
    // Left panel — standing man with folding fan, seated observers; shows the artistry of the composition
    zoom: { size: '310%', pos: '18% 48%' },
  },
  {
    index: '02',
    fact: 'In Kabuki, female roles were traditionally performed by men called onnagata. The elegantly dressed central figure may actually be a male actor portraying a woman.',
    // Tight zoom on the central standing figure in the floral purple robe
    zoom: { size: '520%', pos: '50% 20%' },
  },
  {
    index: '03',
    fact: 'Everyone appears to be reacting to a tense private conversation — or a dramatic reveal — unfolding somewhere just off the edge of the print.',
    // Right panel — figures glancing toward the edge; mysterious framed portrait in the corner
    zoom: { size: '380%', pos: '82% 46%' },
  },
];

/* ─────────────────────────────────────────
   TRIVIA SCREEN — shown after unlock, before mission 1
   Tap anywhere to advance; last fact → onDone
   Background: full-bleed painting, pans + zooms per fact
───────────────────────────────────────── */
function TriviaScreen({ teamName, onDone }) {
  const [idx, setIdx] = React.useState(0);
  const [animKey, setAnimKey] = React.useState(0);
  const [bridgeShown, setBridgeShown] = React.useState(false);

  const advance = () => {
    if (idx < TRIVIA.length - 1) {
      setIdx(i => i + 1);
      setAnimKey(k => k + 1);
    } else if (!bridgeShown) {
      /* First tap on fact 03: reveal the bridge question */
      setBridgeShown(true);
    } else {
      /* Second tap: move on to Mission 1 */
      onDone();
    }
  };

  const t = TRIVIA[idx];

  return (
    <div
      onClick={advance}
      style={{
        width: '100%', height: '100%',
        position: 'relative',
        color: T.ink, cursor: 'pointer',
        overflow: 'hidden',
      }}
    >
      <style>{`
        @keyframes triviaIn {
          from { opacity: 0; transform: translateY(28px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes bridgeSlideUp {
          from { opacity: 0; transform: translateY(48px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      `}</style>

      {/* ── Painting background — pans + zooms per fact ── */}
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: `url('./painting.jpg')`,
        backgroundSize: t.zoom.size,
        backgroundPosition: t.zoom.pos,
        backgroundRepeat: 'no-repeat',
        transition: 'background-size 1.4s cubic-bezier(0.4, 0, 0.2, 1), background-position 1.4s cubic-bezier(0.4, 0, 0.2, 1)',
      }} />

      {/* ── Translucent dark overlay so text stays readable ── */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'rgba(14, 14, 12, 0.72)',
      }} />

      {/* ── All UI content sits above the overlay ── */}
      <div style={{
        position: 'relative', zIndex: 1,
        width: '100%', height: '100%',
        display: 'flex', flexDirection: 'column',
      }}>

        {/* Header */}
        <div style={{
          padding: '20px 40px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          borderBottom: `1px solid rgba(255,255,255,0.18)`,
          flexShrink: 0,
        }}>
          <SamLogo height={28} inverted />
          <div style={{
            display:'flex', alignItems:'center', gap: 8,
            border: `2px solid ${T.ink}`,
            padding: '6px 14px', borderRadius: 999,
            fontFamily: MONO, fontWeight: 500, fontSize: 11,
            letterSpacing: '0.06em', textTransform: 'uppercase',
            color: T.ink,
          }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.highlight }}/>
            <span>{teamName}</span>
          </div>
        </div>

        {/* Eyebrow */}
        <div style={{
          padding: '28px 40px 0',
          fontFamily: MONO, fontWeight: 500, fontSize: 11,
          letterSpacing: '0.08em', textTransform: 'uppercase',
          color: T.highlight,
          flexShrink: 0,
        }}>
          did you know
        </div>

        {/* Fact area — animates on each new fact */}
        <div
          key={animKey}
          style={{
            flex: 1,
            display: 'flex', flexDirection: 'column',
            justifyContent: 'center',
            padding: '0 40px 24px',
            animation: 'triviaIn 0.45s cubic-bezier(0.34,1.56,0.64,1)',
          }}
        >
          {/* Giant index — Self Modern, faded vermillion */}
          <div style={{
            fontFamily: SERIF, fontWeight: 400,
            fontSize: 160, lineHeight: 0.85,
            color: T.highlight, opacity: 0.25,
            letterSpacing: '-0.03em',
            marginBottom: 16,
            userSelect: 'none',
            pointerEvents: 'none',
          }}>
            {t.index}
          </div>

          {/* The fact — large Cosmica */}
          <p style={{
            fontFamily: SANS, fontWeight: 500, fontSize: 30,
            color: T.ink, lineHeight: 1.42,
            letterSpacing: '-0.01em',
            margin: 0,
          }}>
            {t.fact}
          </p>

        </div>

        {/* ── "Your turn" bridge — slides up on first tap of fact 03 ── */}
        {idx === TRIVIA.length - 1 && bridgeShown && (
          <div style={{
            flexShrink: 0,
            padding: '28px 40px 32px',
            background: 'rgba(8, 8, 6, 0.62)',
            borderTop: `2px solid ${T.highlight}`,
            animation: 'bridgeSlideUp 0.55s cubic-bezier(0.34,1.56,0.64,1)',
          }}>
            <div style={{
              fontFamily: MONO, fontWeight: 500, fontSize: 11,
              letterSpacing: '0.10em', textTransform: 'uppercase',
              color: T.highlight, marginBottom: 14,
            }}>your turn</div>
            <div style={{
              fontFamily: SERIF, fontWeight: 400, fontSize: 54,
              color: T.ink, lineHeight: 0.98,
              letterSpacing: '-0.02em',
            }}>
              so — what do you think<br/>the drama is?
            </div>
          </div>
        )}

        {/* Bottom nav */}
        <div style={{
          padding: '20px 40px 32px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          flexShrink: 0,
          borderTop: `1px solid rgba(255,255,255,0.18)`,
        }}>
          {/* Pill dots */}
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {TRIVIA.map((_, i) => (
              <div key={i} style={{
                width: i === idx ? 28 : 8, height: 8,
                borderRadius: 999,
                background: i === idx ? T.highlight : 'rgba(255,255,255,0.3)',

function Mission1Screen({ teamName, onLock, tweaks }) {
  const [story, setStory] = React.useState('');
  const [listening, setListening] = React.useState(false);
  const [locked, setLocked] = React.useState(false);
  const recognitionRef = React.useRef(null);

  /* Slide the bridge question up from off-screen bottom on mount —
     starts from where it was sitting on the trivia screen */
  const [bridgeUp, setBridgeUp] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => setBridgeUp(true), 20);
    return () => clearTimeout(t);
  }, []);

  /* Focus textarea after transition so iPad keyboard appears */
  const textareaRef = React.useRef(null);
  React.useEffect(() => {
    const t = setTimeout(() => { textareaRef.current && textareaRef.current.focus(); }, 750);
    return () => clearTimeout(t);
  }, []);

  const speechSupported = typeof window !== 'undefined' &&
    ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window);

  const toggleVoice = () => {
    if (!speechSupported) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (listening) {
      recognitionRef.current && recognitionRef.current.stop();
      setListening(false);
      return;
    }
    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'en-US';
    recognitionRef.current = rec;
    let base = story;
    rec.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }
      if (final) base += (base ? ' ' : '') + final;
      setStory(base + (interim ? (base ? ' ' : '') + interim : ''));
    };
    rec.onerror = () => setListening(false);
    rec.onend = () => setListening(false);
    rec.start();
    setListening(true);
  };

  React.useEffect(() => () => {
    recognitionRef.current && recognitionRef.current.stop();
  }, []);

  const handleLock = () => {
    if (!story.trim()) return;
    recognitionRef.current && recognitionRef.current.stop();
    setListening(false);
    setLocked(true);
    setTimeout(() => onLock(story.trim()), 600);
  };

  return (
    <div style={{
      width:'100%', height:'100%',
      background: T.paper,
      display:'flex', flexDirection:'column',
      color: T.ink, position:'relative', overflow:'hidden',
    }}>

        borderBottom: `1px solid ${T.rule}`,
      }}>
          <SamLogo height={28} inverted />
        <div style={{
          display:'flex', alignItems:'center', gap: 8,
          border: `2px solid ${T.ink}`,
          padding: '6px 14px', borderRadius: 999,
          fontFamily: MONO, fontWeight: 500, fontSize: 11,
          letterSpacing: '0.06em', textTransform: 'uppercase',
          color: T.ink,
        }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.highlight }}/>
          <span>{teamName}</span>
        </div>
      </div>

      <div style={{ padding:'32px 40px 0', flex:1, display:'flex', flexDirection:'column' }}>

        {/* Mission progress */}
        <div style={{ display:'flex', alignItems:'center', gap: 12, marginBottom: 22 }}>
          <div style={{
            fontFamily: MONO, fontWeight: 500, fontSize: 11,
            letterSpacing: '0.08em', textTransform: 'uppercase',
            color: T.inkMid,
          }}>01 / 02</div>
          <div style={{ flex:1, display:'flex', gap: 4 }}>
            <div style={{ flex:1, height: 2, background: T.ink, borderRadius: 2 }}/>
            <div style={{ flex:1, height: 2, background: T.rule, borderRadius: 2, opacity: 0.4 }}/>
          </div>
        </div>

        {/* Bridge question — travels up from the bottom of the previous screen */}
        <div style={{
          marginBottom: 20,
          transform: bridgeUp ? 'translateY(0)' : 'translateY(860px)',
          transition: 'transform 0.58s cubic-bezier(0.22, 0.9, 0.32, 1)',
        }}>
          <div style={{
            fontFamily: MONO, fontWeight: 500, fontSize: 11,
            letterSpacing: '0.10em', textTransform: 'uppercase',
            color: T.highlight, marginBottom: 10,
          }}>your turn</div>
          <h2 style={{
            fontFamily: SERIF,
            fontSize: 48, fontWeight: 400, lineHeight: 0.96,
            color: T.ink, letterSpacing: '-0.02em',
            margin: 0,
          }}>
            so — what do you think<br/>the drama is?
          </h2>
        </div>

        <p style={{
          fontFamily: SANS,
          fontSize: 16, fontWeight: 400, lineHeight: 1.5,
          color: T.inkSoft,
          marginBottom: 20, maxWidth: 540,
        }}>
          look at the painting. talk it out as a group. then tell us your most creative story.
        </p>

        {/* Story input — chalk card with 2px ink border */}
        <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
          <div style={{ position:'relative', flex:1, minHeight: 200 }}>
            <textarea
              ref={textareaRef}
              value={story}
              onChange={e => !locked && setStory(e.target.value)}
              readOnly={locked}
              placeholder="tell us your juiciest story."
              style={{
                width:'100%', height:'100%',
                minHeight: 200,
                background: T.paperDim,
                border: `2px solid ${listening ? T.highlight : T.ink}`,
                borderRadius: 20,

                color: T.ink,
                resize:'none',

                caretColor: T.ink,
                transition: 'border-color 0.2s',
              }}
            />
            {listening && (
              <div style={{
                position:'absolute', top:16, right:16,
                display:'flex', alignItems:'center', gap:7,
                background: T.highlight, color: T.paper,

            background: listening ? T.highlight : 'transparent',
            color: listening ? T.paper : T.ink,
            cursor: speechSupported ? 'pointer' : 'not-allowed',
            opacity: speechSupported ? 1 : 0.4,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
            fontFamily: MONO, fontWeight: 500, fontSize: 12,
            letterSpacing: '0.06em', textTransform: 'uppercase',
            transition: 'transform 280ms cubic-bezier(0.34,1.56,0.64,1)',
          }}>
            {/* mic icon */}
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0M12 19v3M9 22h6"/>
            </svg>
            <span>{listening ? 'stop' : (speechSupported ? 'narrate with voice' : 'voice unavailable')}</span>
          </button>
        </div>

        {/* Lock button */}
        <div style={{ paddingBottom: 28, paddingTop: 14 }}>
          <PillButton onClick={handleLock} disabled={!story.trim() || locked} variant="primary">
            lock it in
          </PillButton>
        </div>
      </div>

      <style>{`
        @keyframes recPulse {

            <div style={{
              fontFamily: MONO, fontSize: 9, fontWeight: 600,
              letterSpacing: '0.08em', textTransform: 'uppercase',
              color: T.highlight, marginBottom: 4,
            }}>saved</div>
            <div style={{ fontFamily: SERIF, fontSize: 16, fontWeight: 400, color: T.paper, lineHeight: 1.2 }}>
              Gathering at the House of Ichikawa Danjūrō VIII
            </div>
            <div style={{ fontFamily: SANS, fontSize: 12, fontWeight: 400, color: T.inkMid, marginTop: 3 }}>
              Utagawa Kunisada I
            </div>
          </div>
        </div>

        {/* Placeholder slots */}
        {[
          { img: './painting-2.jpg', title: 'The Studio', artist: 'Jacob Lawrence' },
          { img: './painting-3.jpg', title: 'Sea Change', artist: 'Jackson Pollock' },
        ].map((p, i) => (
          <div key={i} style={{
            borderRadius: 16, overflow: 'hidden',
            border: '1.5px solid rgba(0,0,0,0.10)',
            boxShadow: '0 4px 16px rgba(0,0,0,0.08)',
          }}>
            <div style={{
              height: 140,
              backgroundImage: `url('${p.img}')`,
              backgroundSize: 'cover',
              backgroundPosition: 'center',
              backgroundColor: T.paperDeep,
            }} />
            <div style={{ padding: '12px 14px 14px', background: '#fff' }}>
              <div style={{
                fontFamily: MONO, fontSize: 9, fontWeight: 600,
                letterSpacing: '0.08em', textTransform: 'uppercase',
                color: T.highlight, marginBottom: 4,
              }}>saved</div>
              <div style={{ fontFamily: SERIF, fontSize: 16, fontWeight: 400, color: T.paper, lineHeight: 1.2 }}>{p.title}</div>
              <div style={{ fontFamily: SANS, fontSize: 12, fontWeight: 400, color: T.inkMid, marginTop: 3 }}>{p.artist}</div>
            </div>
          </div>
        ))}

      </div>

      {/* Return button */}
      <div style={{ padding: '0 40px 40px', flexShrink: 0 }}>
        <button onClick={onReturn} style={{
          width: '100%', padding: '18px 28px',
          background: T.paper, border: 'none', borderRadius: 999,
          fontFamily: SANS, fontWeight: 600, fontSize: 16,
          color: T.ink, cursor: 'pointer', letterSpacing: '0.01em',
          transition: 'background 0.18s, transform 0.18s',
        }}
          onMouseEnter={e => e.currentTarget.style.background = T.paperDim}
          onMouseLeave={e => e.currentTarget.style.background = T.paper}
          onMouseDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
          onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
        >
          ← back to painting
        </button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   MAIN APP
───────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "darkMode": false,
  "artistLabel": "Utagawa Kunisada I (Toyokuni III)",
  "teamPrefix": "the"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('idle');
  const [teamName, setTeamName] = React.useState('');
  const [chosenPrompts, setChosenPrompts] = React.useState('');

  const scale = useScaleToFit(768, 1024);

  /* ── Save flow ── */
  const handleSaveClick      = () => setScreen('nfc-save');
  const handleNfcSave        = () => { if (!teamName) setTeamName(TEAM_NAMES[0]); setScreen('saving'); };
  const handleSavingDone     = () => setScreen('collection');
  const handleCollectionReturn = () => setScreen('idle');

  /* ── Game flow ── */
  const handleGameClick  = () => setScreen('nfc-game');
  const handleNfcGame    = () => {
    const name = TEAM_NAMES[Math.floor(Math.random() * TEAM_NAMES.length)];
    setTeamName(name);
    setChosenPrompts('');
    setScreen('unlock');
  };
  const handleUnlockDone   = () => setScreen('trivia');
  const handleTriviaDone   = () => setScreen('mission1');
  const handleLockStory    = (story) => { setChosenPrompts(story); setScreen('mission2'); };
  const handleCapture      = () => setScreen('completion');
  const handleSeeProgress  = () => setScreen('progress');
  const handleReset        = () => { setTeamName(''); setChosenPrompts(''); setScreen('idle'); };

  const renderScreen = () => {
    switch (screen) {
      case 'idle':       return <IdleScreen onSave={handleSaveClick} onGame={handleGameClick} tweaks={tweaks} />;
      case 'nfc-save':   return <NfcScreen mode="save" onTap={handleNfcSave} />;
      case 'saving':     return <SavingScreen onDone={handleSavingDone} teamName={teamName} />;
      case 'collection': return <CollectionScreen onReturn={handleCollectionReturn} />;
      case 'nfc-game':   return <NfcScreen mode="game" onTap={handleNfcGame} />;
      case 'unlock':     return <UnlockScreen teamName={teamName} onComplete={handleUnlockDone} />;
      case 'trivia':     return <TriviaScreen teamName={teamName} onDone={handleTriviaDone} />;
      case 'mission1':   return <Mission1Screen teamName={teamName} onLock={handleLockStory} tweaks={tweaks} />;
      case 'mission2':   return <Mission2Screen teamName={teamName} onCapture={handleCapture} tweaks={tweaks} />;
      case 'completion': return <CompletionScreen teamName={teamName} chosenPrompts={chosenPrompts} onReset={handleReset} onSeeProgress={handleSeeProgress} tweaks={tweaks} />;
      case 'progress':   return <ProgressScreen teamName={teamName} onReturn={handleReset} />;
      default: return null;
    }
  };

  /* Tweaks panel jump-to-screen */
  const screenLabels  = ['idle','nfc-save','saving','collection','nfc-game','unlock','trivia','mission 1','mission 2','complete','progress'];
  const screenKeys    = ['idle','nfc-save','saving','collection','nfc-game','unlock','trivia','mission1','mission2','completion','progress'];
  const currentLabel  = screenLabels[screenKeys.indexOf(screen)] || 'idle';

  return (
    <>
      <div style={{
        transform: `scale(${scale})`,
        transformOrigin: 'center center',
        transition: 'transform 0.2s ease',
      }}>
        <div className="tablet-shell" data-screen-label={`Tablet — ${screen}`}>
          {/* Status pill */}
          <div style={{
            position:'absolute', top:14, left:0, right:0,
            display:'flex', justifyContent:'center',
            zIndex:100, pointerEvents:'none',
          }}>
            <div style={{
              width:100, height:5,
              background:'rgba(255,255,255,0.15)',
              borderRadius:10,
            }}/>
          </div>

          <div className="tablet-screen">
            <div style={{ position:'absolute', inset:0 }}>
              {renderScreen()}
            </div>
          </div>
        </div>

        <div style={{
          textAlign:'center', marginTop: 18,
          fontFamily: MONO, fontSize: 10, letterSpacing:'0.04em',
          color: 'rgba(255,255,255,0.25)',
        }}>
          SAM · Breadcrumbs · tablet prototype
        </div>
      </div>

      <window.TweaksPanel>
        <window.TweakSection label="content" />
        <window.TweakText
          label="artist label"
          value={tweaks.artistLabel}
          onChange={v => setTweak('artistLabel', v)}
        />
        <window.TweakSection label="screens" />
        <window.TweakSelect
          label="jump to screen"
          options={screenLabels}
          value={currentLabel}
          onChange={v => {
            const target = screenKeys[screenLabels.indexOf(v)] || 'idle';
            if (!['idle','nfc-save','saving','collection','nfc-game'].includes(target) && !teamName)
              setTeamName(TEAM_NAMES[0]);
            setScreen(target);
          }}
        />
      </window.TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
